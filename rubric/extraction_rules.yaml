
# Extraction Rules Constitution
# Phase 1 improved edition — robust for real-world enterprise PDFs
# Update ONLY this file, never code.

# ─── Origin Type Detection ─────────────────────────────────────────────────────
origin_detection:
  # How many pages to sample across a document for origin/layout signals.
  # Using more interior pages avoids cover/back-cover bias (common in annual reports).
  sample_pages_max: 8

  # Scanned detection thresholds
  # NOTE: origin_type is primarily driven by text density + font metadata.
  # image_ratio is used as a *supporting* scanned signal.
  scanned_max_char_density: 0.08         # below this = page looks scanned/empty-text
  scanned_min_image_ratio: 0.85          # >= 85% image area is very likely scanned
  scanned_support_image_ratio: 0.50      # >= 50% image area + very low density => scanned

  # Mixed origin (native + sparse pages) heuristics
  mixed_low_density_threshold: 1.0       # pages below this are considered sparse
  mixed_high_density_threshold: 3.0      # pages above this are considered dense
  mixed_low_density_fraction: 0.15       # >=15% sparse pages
  mixed_high_density_fraction: 0.40      # >=40% dense pages

  # Digital detection thresholds
  # Digital PDFs commonly land in the ~2–20 chars/1000 pt² range depending on fonts/layout.
  digital_min_char_density: 0.15         # >= 0.15 chars/1000 pt² indicates extractable text

  # Mixed detection heuristics
  # A document is labeled "mixed" only when *most sampled pages* look scanned but
  # there is still some clear digital text present.
  scanned_low_density_fraction: 0.60     # >= 60% low-density pages => mostly scanned
  digital_high_density_fraction: 0.30    # >= 30% high-density pages => enough digital evidence

  # Legacy threshold retained for compatibility (no longer a primary origin driver).
  mixed_image_ratio_lower: 0.35

  # Form detection
  form_fillable_detection: true

# ─── Layout Complexity Detection ───────────────────────────────────────────────
layout_detection:
  # Multi-column detection (heuristic)
  # A page is considered "two-column" when it has enough words on both the left and right
  # halves of the page (excluding a small center gutter).
  multi_column_min_words_each_side: 50
  multi_column_min_page_fraction: 0.25
  mixed_multi_column_min_fraction: 0.70
  multi_column_center_gutter_frac: 0.05

  # Backwards-compatible key (no longer the primary multi-column driver)
  multi_column_min_clusters: 2

  table_heavy_min_ratio: 0.12             # tables >12% = table-heavy
  mixed_table_min_ratio: 0.05             # tables >=5% + multi-column => mixed
  figure_heavy_min_ratio: 0.30            # figures >30% = figure-heavy

# ─── Confidence Scoring ────────────────────────────────────────────────────────
confidence_thresholds:
  fast_text_min: 0.60                     # promote from Strategy A if below
  layout_min: 0.45                        # promote from Strategy B if below
  min_chars_per_page: 100                 # pages <100 chars = low-confidence flag

# ─── Strategy Routing ──────────────────────────────────────────────────────────
strategy_routing:
  strategy_a:                             # Cheapest path, used when safe
    requires_origin: [native_digital, form_fillable]
    requires_layout: [single_column]

  strategy_b:                             # Mid-cost (layout model)
    requires_origin: [native_digital, mixed]
    requires_layout: [multi_column, table_heavy, figure_heavy, mixed]

  strategy_c:                             # Vision-model fallback
    requires_origin: [scanned_image]

# ─── Budget Guard ──────────────────────────────────────────────────────────────
budget:
  max_cost_per_doc_usd: 0.10
  vision_model: "gemini-1.5-flash"
  token_cost_per_1m_input: 0.075
  token_cost_per_1m_output: 0.30
  max_pages_vision_per_doc: 50

# ─── Chunking Constitution ─────────────────────────────────────────────────────
chunking:
  max_tokens_per_ldu: 512
  min_tokens_for_split: 256
  table_always_together: true             # Never split header from cells
  figure_caption_as_metadata: true        # Keep figure captions with metadata
  list_as_single_ldu: true                # Lists stay together
  header_as_parent_metadata: true         # Section headers become metadata
  resolve_cross_references: true          # Extract "see section X" links

